<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Vote pour le Défi des Cantons</title>
    <link
      href="{{ url_for('static', path='/css/pico.red.min.css') }}"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', path='/css/site.css') }}"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <img
        class="logo"
        src="{{ url_for('static', path='/img/apero-escape.svg') }}"
        alt="Logo"
      />
    </header>
    <main class="container">
      <h1>Défi des cantons - Vote Accepté</h1>

      <p>
        Votre vote a été enregistré avec succès. Merci pour votre participation
        !
      </p>
      <p>Vous avez voté pour le canton {{ api_response.canton }}</p>
      <p>Votre canton a maintenant {{ api_response.new_counter }} votes</p>

      <p>
        <a href="https://housetrap.github.io/dc-demo/"
          >Résultats de tous les cantons</a
        >
      </p>
    </main>
  </body>
</html>
