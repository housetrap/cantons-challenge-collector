services:
  api:
    image: ghcr.io/housetrap/cantons-challenge-api:latest
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync always --notify-keyspace-events K$
    deploy:
      resources:
        limits:
          cpus: '1'

volumes:
  redis_data:
